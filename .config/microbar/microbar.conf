use-messenger true;
acquire-system-tray true;

set window-x 0 integer;
set window-y 0 integer;
set window-x-offset 0 integer;
set window-y-offset 0 integer;
set window-width 20 integer;
set window-height 20 integer;
set window-position top;
set window-horizontal-alignment left;
set window-vertical-alignment top;
set window-background 0xFF171717;

set text-x-1 0 integer;
set text-y-1 0 integer;
set text-x-offset-1 3 integer;
set text-y-offset-1 0 integer;
set text-horizontal-alignment-1 left;
set text-vertical-alignment-1 center;
set text-rotation-1 none;
set text-foreground-1 0xFFFFFFFF;
set text-background-1 0xFF171717;

set text-x-2 0 integer;
set text-y-2 0 integer;
set text-x-offset-2 -3 integer;
set text-y-offset-2 0 integer;
set text-horizontal-alignment-2 right;
set text-vertical-alignment-2 center;
set text-rotation-2 none;
set text-foreground-2 0xFFFFFFFF;
set text-background-2 0xFF171717;

set text-x-3 0 integer;
set text-y-3 0 integer;
set text-x-offset-3 0 integer;
set text-y-offset-3 0 integer;
set text-horizontal-alignment-3 center;
set text-vertical-alignment-3 center;
set text-rotation-3 none;
set text-foreground-3 0xFFFFFFFF;
set text-background-3 0xFF171717;

set tray-window-x 202;
set tray-window-y 1;
set tray-window-x-offset 0;
set tray-window-y-offset 0;
set tray-window-background 0xFF171717;

set tray-icon-x-offset 0;
set tray-icon-y-offset 0;
set tray-icon-size 17;
set tray-icon-padding 0;

set command-1 "~/.config/microbar/microbar-script-left.sh";
set command-2 "~/.config/microbar/microbar-script-right.sh";
set command-3 "~/.config/microbar/microbar-script-center.sh";
set interval 1000;
set font "-misc-fixed-medium-r-semicondensed--13-*-*-*-*-*-iso10646-1";

do show;

// b-keycode none | shift | caps | control | mod-1 | mod-2 | mod-3 | mod-4 | mod-5 | any xyz press | release command parameter1 parameter2 parameter3 parameter4 parameter5
grab-keycode                       control |                         mod-4               111 press           toggle-visibility;

